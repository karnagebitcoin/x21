version: "3.8"

services:
  x21:
    container_name: x21-nginx
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_PROXY_SERVER: ${X21_PROXY_SERVER_URL:-http://localhost:8090}
    ports:
      - "8089:80"
    restart: unless-stopped
    networks:
      - x21

  proxy-server:
    image: ghcr.io/danvergara/jumble-proxy-server:latest
    environment:
      - ALLOW_ORIGIN=${X21_SOCIAL_URL:-http://localhost:8089}
      - X21_PROXY_GITHUB_TOKEN=${X21_PROXY_GITHUB_TOKEN}
      - ENABLE_PPROF=true
      - PORT=8080
    ports:
      - "8090:8080"
    networks:
      - x21

networks:
  x21:
