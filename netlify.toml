[build]
command = "npm run build"
publish = "dist"

[functions]
directory = "netlify/functions"

[[redirects]]
from = "/v1/*"
to = "/.netlify/functions/api/:splat"
status = 200

[[redirects]]
from = "/.well-known/nostr.json"
to = "/.netlify/functions/api/.well-known/nostr.json"
status = 200
force = true
